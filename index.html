<!-- Pre-initialize Tailwind config before the CDN loads so the JIT
     engine picks up custom fontSize tokens on its first DOM scan.
     text-xxs  = 10px / 14px lh  (one step below text-xs at 12px)
     text-xxxs =  8px / 12px lh  (two steps below text-xs) -->
<script>
  window.tailwind = {
    config: {
      theme: {
        extend: {
          fontSize: {
            'xxs':  ['0.625rem', { lineHeight: '0.875rem' }],
            'xxxs': ['0.5rem',   { lineHeight: '0.75rem'  }],
          }
        }
      }
    }
  }
</script>

<script src="offline-charts.js"></script>
<script>
/* ================================
   STORAGE STRUCTURE
================================= */
const DATA_KEY    = "income_data";
const META_KEY    = "income_meta";
const DEV_MODE_KEY = "ll_dev_mode";
const APP_VERSION = "1.2.1"; // bump this with every deploy (must match version.json)

let devMode = localStorage.getItem(DEV_MODE_KEY) === "1";
let devTapCount = 0;

/*
income_data = {
  records: [],
  locations: {
    "Downtown Bar": { lastRate: 25 }
  }
}
*/

function initStorage() {
  if (!localStorage.getItem(DATA_KEY)) {
    localStorage.setItem(DATA_KEY, JSON.stringify({
      records: [],
      locations: {},
      customFields: []
    }));
  }

  if (!localStorage.getItem(META_KEY)) {
    localStorage.setItem(META_KEY, JSON.stringify({
      userId: "user1",
      nextId: 1
    }));
  }
}
initStorage();

/* ================================
   HELPERS
================================= */
const $ = id => document.getElementById(id);

function loadData() {
  return JSON.parse(localStorage.getItem(DATA_KEY));
}
function saveData(d) {
  localStorage.setItem(DATA_KEY, JSON.stringify(d));
}
function loadMeta() {
  return JSON.parse(localStorage.getItem(META_KEY));
}
function saveMeta(m) {
  localStorage.setItem(META_KEY, JSON.stringify(m));
}

function generateId() {
  const m = loadMeta();
  const id = `income_${m.userId}_${m.nextId}`;
  m.nextId++;
  saveMeta(m);
  return id;
}

function todayISO() {
  // Use local date instead of UTC to avoid timezone shifts
  const d = new Date();
  const year = d.getFullYear();
  const month = String(d.getMonth() + 1).padStart(2, "0");
  const day = String(d.getDate()).padStart(2, "0");
  return `${year}-${month}-${day}`;
}
function money(v) {
  return `$${Number(v || 0).toFixed(2)}`;
}

function normalizeHexColor(hex) {
  if (!hex) return null;
  const s = String(hex).trim();
  if (!s || s === "none") return null;
  const withHash = s.startsWith("#") ? s : `#${s}`;
  const m = withHash.match(/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6})$/);
  if (!m) return null;
  let h = m[0].toLowerCase();
  if (h.length === 4) {
    h = `#${h[1]}${h[1]}${h[2]}${h[2]}${h[3]}${h[3]}`;
  }
  return h;
}

function hexToRgba(hex, alpha = 1) {
  const h = normalizeHexColor(hex);
  if (!h) return null;
  const r = parseInt(h.slice(1, 3), 16);
  const g = parseInt(h.slice(3, 5), 16);
  const b = parseInt(h.slice(5, 7), 16);
  const a = Math.max(0, Math.min(1, Number(alpha)));
  return `rgba(${r}, ${g}, ${b}, ${a})`;
}

function getLocationPreferredColor(loc) {
  const d = loadData();
  const c = d?.locations?.[loc]?.preferredColor;
  return normalizeHexColor(c);
}

function getLocationTintStyle(loc) {
  const hex = getLocationPreferredColor(loc);
  if (!hex) return "";
  const bg = hexToRgba(hex, 0.10);
  const border = hexToRgba(hex, 0.30);
  if (!bg || !border) return "";
  return `background-color: ${bg}; border-color: ${border};`;
}

// Date filter for history and charts - must be defined early
var dateFilter = { type: "all", startDate: null, endDate: null, label: "All Time" };

// History filters & sorting
var historyFilters = {
  // Per custom field key:
  // - text: { selected: Set<string> }
  // - number/money: { min: number|null, max: number|null }
  // - checkbox: { onlyChecked: boolean }
  custom: {}
};

var historySort = { type: "date", key: null, direction: "desc" };

var dashboardFilters = {
  custom: {}
};

function countActiveCustomFilters(filters) {
  const custom = filters?.custom || {};
  let count = 0;
  Object.values(custom).forEach(f => {
    if (!f) return;
    if (f.selected && f.selected.size) count += 1;
    else if (typeof f.onlyChecked === "boolean" && f.onlyChecked) count += 1;
    else if (f.min !== null || f.max !== null) count += 1;
  });
  return count;
}

function countActiveDateFilter() {
  return dateFilter && dateFilter.type !== "all" ? 1 : 0;
}

function getRecordFieldValue(record, def) {
  const raw = record?.[def.key];
  if (raw === null || raw === undefined) return null;
  if (def.type === "checkbox") {
    const checked = raw === true || raw === "true" || raw === 1 || raw === "1";
    return checked;
  }
  if (def.type === "number" || def.type === "money") {
    const v = parseFloat(raw);
    return Number.isFinite(v) ? v : null;
  }
  return String(raw);
}

function applyCustomFilters(records, defs, filters) {
  const customDefs = defs || [];
  const active = filters || historyFilters;
  return records.filter(r => {
    for (const def of customDefs) {
      if (!def || !def.key) continue;
      const f = active.custom?.[def.key];
      if (!f) continue;

      if (def.type === "checkbox") {
        if (f.onlyChecked) {
          const checked = getRecordFieldValue(r, def);
          if (!checked) return false;
        }
      } else if (def.type === "number" || def.type === "money") {
        const v = getRecordFieldValue(r, def);
        if (v === null) {
          if (f.min !== null || f.max !== null) return false;
        } else {
          if (f.min !== null && v < f.min) return false;
          if (f.max !== null && v > f.max) return false;
        }
      } else {
        const val = getRecordFieldValue(r, def);
        const selected = f.selected;
        if (selected && selected.size) {
          if (!val || !selected.has(val)) return false;
        }
      }
    }
    return true;
  });
}

function applyHistorySort(records, defs) {
  const out = [...records];
  const t = historySort?.type || "date";
  if (t === "date") {
    out.sort((a, b) => (historySort.direction === "asc" ? a.date.localeCompare(b.date) : b.date.localeCompare(a.date)));
    return out;
  }
  if (t === "total") {
    out.sort((a, b) => {
      const av = calculateRecordTotal(a, defs);
      const bv = calculateRecordTotal(b, defs);
      return historySort.direction === "asc" ? (av - bv) : (bv - av);
    });
    return out;
  }
  if (t === "custom-number" && historySort.key) {
    const def = (defs || []).find(d => d && d.key === historySort.key);
    out.sort((a, b) => {
      const av = def ? (getRecordFieldValue(a, def) ?? -Infinity) : -Infinity;
      const bv = def ? (getRecordFieldValue(b, def) ?? -Infinity) : -Infinity;
      return historySort.direction === "asc" ? (av - bv) : (bv - av);
    });
    return out;
  }
  return out;
}

function showHistoryFilterMenu() {
  const data = loadData();
  const defs = data.customFields || [];
  const records = data.records.filter(r => !r.deleted);

  // Build unique text values + numeric ranges from all data (fast, local)
  const uniques = {};
  const ranges = {};
  defs.forEach(def => {
    if (!def || !def.key) return;
    if (def.type === "text" || def.type === "date") uniques[def.key] = new Set();
    if (def.type === "number" || def.type === "money") ranges[def.key] = { min: Infinity, max: -Infinity };
  });

  records.forEach(r => {
    defs.forEach(def => {
      if (!def || !def.key) return;
      const v = getRecordFieldValue(r, def);
      if (v === null || v === "" || v === false) return;
      if (uniques[def.key]) uniques[def.key].add(String(v));
      if (ranges[def.key] && typeof v === "number") {
        ranges[def.key].min = Math.min(ranges[def.key].min, v);
        ranges[def.key].max = Math.max(ranges[def.key].max, v);
      }
    });
  });

  const numericSections = defs
    .filter(d => d && (d.type === "number" || d.type === "money"))
    .map(d => {
      const r = ranges[d.key];
      if (!r || !Number.isFinite(r.min) || !Number.isFinite(r.max)) return "";
      const cur = historyFilters.custom?.[d.key] || { min: null, max: null };
      const step = d.type === "money" ? "0.01" : "1";
      return `
        <div class="bg-gray-800/50 rounded p-3 space-y-2">
          <div class="text-xs text-gray-300">${d.label}</div>
          <div class="grid grid-cols-2 gap-2">
            <input type="number" step="${step}" id="hf_${d.key}_min" placeholder="Min" value="${cur.min ?? ''}" class="w-full p-2 bg-gray-800 rounded text-sm text-gray-100">
            <input type="number" step="${step}" id="hf_${d.key}_max" placeholder="Max" value="${cur.max ?? ''}" class="w-full p-2 bg-gray-800 rounded text-sm text-gray-100">
          </div>
          <div class="text-[11px] text-gray-400">Range: ${d.type === "money" ? money(r.min) : r.min} – ${d.type === "money" ? money(r.max) : r.max}</div>
        </div>
      `;
    }).join("");

  const textSections = defs
    .filter(d => d && (d.type === "text" || d.type === "date"))
    .map(d => {
      const set = uniques[d.key];
      if (!set) return "";
      const values = [...set].sort();
      if (values.length === 0 || values.length > 20) return "";
      const cur = historyFilters.custom?.[d.key];
      const selected = cur?.selected || new Set();
      return `
        <div class="bg-gray-800/50 rounded p-3 space-y-2">
          <div class="text-xs text-gray-300">${d.label}</div>
          <div class="grid grid-cols-2 gap-2">
            ${values.map(v => `
              <label class="flex items-center gap-2 text-xs text-gray-300/80">
                <input type="checkbox" class="accent-indigo-500" data-hf-text="${d.key}" value="${v.replace(/"/g, '&quot;')}" ${selected.has(v) ? 'checked' : ''}>
                <span class="truncate">${v}</span>
              </label>
            `).join("")}
          </div>
        </div>
      `;
    }).join("");

  const checkboxSections = defs
    .filter(d => d && d.type === "checkbox")
    .map(d => {
      const cur = historyFilters.custom?.[d.key] || { onlyChecked: false };
      return `
        <div class="bg-gray-800/50 rounded p-3">
          <label class="flex items-center gap-2 text-xs text-gray-300/80">
            <input type="checkbox" id="hf_${d.key}_onlyChecked" class="accent-indigo-500" ${cur.onlyChecked ? 'checked' : ''}>
            <span>Only show when “${d.label}” is checked</span>
          </label>
        </div>
      `;
    }).join("");

  const menu = `
    <div id="historyFilterOverlay" class="fixed inset-0 bg-black/50 z-40 transition-opacity" onclick="closeHistoryFilterMenu()"></div>
    <div id="historyFilterSheet" class="fixed bottom-20 inset-x-0 max-h-[70vh] overflow-y-auto bg-gray-900 rounded-t-xl p-4 z-50 transform transition-transform duration-300 translate-y-full">
      <div class="flex items-center justify-between mb-3">
        <div class="text-lg font-bold">Filters</div>
        <button onclick="resetHistoryFilters()" class="text-xs text-gray-400">Reset</button>
      </div>

      <div class="space-y-3">
        <div class="bg-gray-800/50 rounded p-3 space-y-2">
          <div class="text-xs text-gray-300">Date range</div>
          <div class="grid grid-cols-2 gap-2">
            <input type="date" id="hf_date_start" value="${dateFilter.type === 'range' ? (dateFilter.startDate || '') : ''}" class="w-full p-2 bg-transparent rounded text-sm text-gray-100 appearance-none border border-gray-700">
            <input type="date" id="hf_date_end" value="${dateFilter.type === 'range' ? (dateFilter.endDate || '') : ''}" class="w-full p-2 bg-transparent rounded text-sm text-gray-100 appearance-none border border-gray-700">
          </div>
          <div class="flex gap-2">
            <button onclick="setDateFilter('all', null, null, 'All Time (Scroll)'); closeHistoryFilterMenu();" class="flex-1 text-xs bg-gray-800 p-2 rounded">All time</button>
            <button onclick="setDateFilter('month', null, null, 'This Month'); closeHistoryFilterMenu();" class="flex-1 text-xs bg-gray-800 p-2 rounded">This month</button>
            <button onclick="setDateFilter('ytd', null, null, 'Year to Date'); closeHistoryFilterMenu();" class="flex-1 text-xs bg-gray-800 p-2 rounded">YTD</button>
          </div>
          <button onclick="applyHistoryDateRange()" class="w-full text-xs bg-indigo-600 p-2 rounded">Apply date range</button>
        </div>

        ${textSections}
        ${numericSections}
        ${checkboxSections}

        <div class="bg-gray-800/50 rounded p-3 space-y-2">
          <div class="text-xs text-gray-300">Sort by</div>
          <select id="hf_sort" class="w-full p-2 bg-gray-800 rounded text-sm text-gray-100">
            <option value="date_desc" ${historySort.type === 'date' && historySort.direction === 'desc' ? 'selected' : ''}>Date (newest)</option>
            <option value="date_asc" ${historySort.type === 'date' && historySort.direction === 'asc' ? 'selected' : ''}>Date (oldest)</option>
            <option value="total_desc" ${historySort.type === 'total' && historySort.direction === 'desc' ? 'selected' : ''}>Highest total</option>
            <option value="total_asc" ${historySort.type === 'total' && historySort.direction === 'asc' ? 'selected' : ''}>Lowest total</option>
            ${(defs || []).filter(d => d && (d.type === 'number' || d.type === 'money')).map(d => `
              <option value="num_${d.key}_desc" ${historySort.type === 'custom-number' && historySort.key === d.key && historySort.direction === 'desc' ? 'selected' : ''}>Most ${d.label}</option>
              <option value="num_${d.key}_asc" ${historySort.type === 'custom-number' && historySort.key === d.key && historySort.direction === 'asc' ? 'selected' : ''}>Least ${d.label}</option>
            `).join('')}
          </select>
        </div>

        <button onclick="applyHistoryFiltersFromUI()" class="w-full bg-indigo-600 p-3 rounded font-semibold">Apply</button>
        <button onclick="closeHistoryFilterMenu()" class="w-full bg-gray-700 p-3 rounded">Close</button>
      </div>
    </div>
  `;

  const existing = $("historyFilterSheet");
  if (existing) existing.remove();
  document.body.insertAdjacentHTML("beforeend", menu);

  requestAnimationFrame(() => {
    const sheet = $("historyFilterSheet");
    const overlay = $("historyFilterOverlay");
    if (sheet) sheet.classList.remove("translate-y-full");
    if (overlay) overlay.classList.remove("opacity-0");
  });
}

function showDashboardFilterMenu() {
  const data = loadData();
  const defs = data.customFields || [];
  const records = data.records.filter(r => !r.deleted);

  const uniques = {};
  const ranges = {};
  defs.forEach(def => {
    if (!def || !def.key) return;
    if (def.type === "text" || def.type === "date") uniques[def.key] = new Set();
    if (def.type === "number" || def.type === "money") ranges[def.key] = { min: Infinity, max: -Infinity };
  });

  records.forEach(r => {
    defs.forEach(def => {
      if (!def || !def.key) return;
      const v = getRecordFieldValue(r, def);
      if (v === null || v === "" || v === false) return;
      if (uniques[def.key]) uniques[def.key].add(String(v));
      if (ranges[def.key] && typeof v === "number") {
        ranges[def.key].min = Math.min(ranges[def.key].min, v);
        ranges[def.key].max = Math.max(ranges[def.key].max, v);
      }
    });
  });

  const textSections = defs
    .filter(d => d && (d.type === "text" || d.type === "date"))
    .map(d => {
      const set = uniques[d.key];
      if (!set) return "";
      const values = [...set].sort();
      if (values.length === 0 || values.length > 20) return "";
      const cur = dashboardFilters.custom?.[d.key];
      const selected = cur?.selected || new Set();
      return `
        <div class="bg-gray-800/50 rounded p-3 space-y-2">
          <div class="text-xs text-gray-300">${d.label}</div>
          <div class="grid grid-cols-2 gap-2">
            ${values.map(v => `
              <label class="flex items-center gap-2 text-xs text-gray-300/80">
                <input type="checkbox" class="accent-indigo-500" data-df-text="${d.key}" value="${v.replace(/"/g, '&quot;')}" ${selected.has(v) ? 'checked' : ''}>
                <span class="truncate">${v}</span>
              </label>
            `).join("")}
          </div>
        </div>
      `;
    }).join("");

  const numericSections = defs
    .filter(d => d && (d.type === "number" || d.type === "money"))
    .map(d => {
      const r = ranges[d.key];
      if (!r || !Number.isFinite(r.min) || !Number.isFinite(r.max)) return "";
      const cur = dashboardFilters.custom?.[d.key] || { min: null, max: null };
      const step = d.type === "money" ? "0.01" : "1";
      return `
        <div class="bg-gray-800/50 rounded p-3 space-y-2">
          <div class="text-xs text-gray-300">${d.label}</div>
          <div class="grid grid-cols-2 gap-2">
            <input type="number" step="${step}" id="df_${d.key}_min" placeholder="Min" value="${cur.min ?? ''}" class="w-full p-2 bg-gray-800 rounded text-sm text-gray-100">
            <input type="number" step="${step}" id="df_${d.key}_max" placeholder="Max" value="${cur.max ?? ''}" class="w-full p-2 bg-gray-800 rounded text-sm text-gray-100">
          </div>
          <div class="text-[11px] text-gray-400">Range: ${d.type === "money" ? money(r.min) : r.min} – ${d.type === "money" ? money(r.max) : r.max}</div>
        </div>
      `;
    }).join("");

  const groupable = defs.filter(d => d && (d.type === "text" || d.type === "date"));
  const groupKey = window.dashboardCustomGroupKey || "";

  const menu = `
    <div id="dashboardFilterOverlay" class="fixed inset-0 bg-black/50 z-40 transition-opacity" onclick="closeDashboardFilterMenu()"></div>
    <div id="dashboardFilterSheet" class="fixed bottom-20 inset-x-0 max-h-[70vh] overflow-y-auto bg-gray-900 rounded-t-xl p-4 z-50 transform transition-transform duration-300 translate-y-full">
      <div class="flex items-center justify-between mb-3">
        <div class="text-lg font-bold">Chart Filters</div>
        <button onclick="resetDashboardFilters()" class="text-xs text-gray-400">Reset</button>
      </div>

      <div class="space-y-3">
        <div class="bg-gray-800/50 rounded p-3 space-y-2">
          <div class="text-xs text-gray-300">Group “Custom” chart by</div>
          <select id="df_group_key" class="w-full p-2 bg-gray-800 rounded text-sm text-gray-100">
            <option value="">(Pick a field)</option>
            ${groupable.map(d => `<option value="${d.key}" ${d.key === groupKey ? 'selected' : ''}>${d.label}</option>`).join("")}
          </select>
          <div class="text-[11px] text-gray-400">This only affects the “Custom” chart tab.</div>
        </div>

        ${textSections}
        ${numericSections}

        <button onclick="applyDashboardFiltersFromUI()" class="w-full bg-indigo-600 p-3 rounded font-semibold">Apply</button>
        <button onclick="closeDashboardFilterMenu()" class="w-full bg-gray-700 p-3 rounded">Close</button>
      </div>
    </div>
  `;

  const existing = $("dashboardFilterSheet");
  if (existing) existing.remove();
  document.body.insertAdjacentHTML("beforeend", menu);

  requestAnimationFrame(() => {
    const sheet = $("dashboardFilterSheet");
    const overlay = $("dashboardFilterOverlay");
    if (sheet) sheet.classList.remove("translate-y-full");
    if (overlay) overlay.classList.remove("opacity-0");
  });
}

function applyDashboardFiltersFromUI() {

function applyHistoryFiltersFromUI() {
  const data = loadData();
  const defs = data.customFields || [];
  const next = { custom: {} };

  defs.forEach(def => {
    if (!def || !def.key) return;
    if (def.type === "text" || def.type === "date") {
      const nodes = document.querySelectorAll(`input[type="checkbox"][data-hf-text="${def.key}"]`);
      const selected = new Set();
      nodes.forEach(n => { if (n.checked) selected.add(n.value); });
      if (selected.size) next.custom[def.key] = { selected };
    } else if (def.type === "number" || def.type === "money") {
      const minRaw = document.getElementById(`hf_${def.key}_min`)?.value;
      const maxRaw = document.getElementById(`hf_${def.key}_max`)?.value;
      const min = minRaw === "" ? null : parseFloat(minRaw);
      const max = maxRaw === "" ? null : parseFloat(maxRaw);
      if (min !== null || max !== null) next.custom[def.key] = { min: Number.isFinite(min) ? min : null, max: Number.isFinite(max) ? max : null };
    } else if (def.type === "checkbox") {
      const onlyChecked = !!document.getElementById(`hf_${def.key}_onlyChecked`)?.checked;
      if (onlyChecked) next.custom[def.key] = { onlyChecked: true };
    }
  });

  historyFilters = next;

  const sortVal = $("hf_sort")?.value || "date_desc";
  if (sortVal.startsWith("date_")) {
    historySort = { type: "date", key: null, direction: sortVal.endsWith("_asc") ? "asc" : "desc" };
  } else if (sortVal.startsWith("total_")) {
    historySort = { type: "total", key: null, direction: sortVal.endsWith("_asc") ? "asc" : "desc" };
  } else if (sortVal.startsWith("num_")) {
    const parts = sortVal.split("_"); // num, key..., dir
    const direction = parts[parts.length - 1] === "asc" ? "asc" : "desc";
    const key = parts.slice(1, -1).join("_");
    historySort = { type: "custom-number", key, direction };
  }

  renderHistory();
  closeHistoryFilterMenu();
}

function getCustomFieldDefs() {

function calculateBasePay(record) {
  const hours = parseFloat(record?.hours) || 0;
  const rate = parseFloat(record?.rate) || 0;
  const payType = record?.payType === "flat" ? "flat" : "hourly";
  return payType === "flat" ? rate : (hours * rate);
}

function calculateMoneyCustomContribution(record, customFieldDefs) {
  if (!record) return 0;
  const defs = customFieldDefs || [];
  let sum = 0;
  defs.forEach(def => {
    if (!def || def.type !== "money") return;
    const raw = record[def.key];
    if (raw === null || raw === undefined || raw === "") return;
    const v = parseFloat(raw);
    if (!Number.isFinite(v)) return;
    const mode = def.addToTotal || "none"; // "none" | "add" | "subtract"
    if (mode === "add") sum += v;
    else if (mode === "subtract") sum -= v;
  });
  return sum;
}

function calculateRecordTotal(record, customFieldDefs) {
  const tips = parseFloat(record?.tips) || 0;
  return calculateBasePay(record) + tips + calculateMoneyCustomContribution(record, customFieldDefs);
}

/* Toast notifications - bottom right, stacking */
function showToast(message, duration = 3000) {
  let container = $("toast-container");
  if (!container) {
    const c = document.createElement("div");
    c.id = "toast-container";
    c.className = "fixed bottom-24 right-4 z-50 flex flex-col gap-2 max-w-[200px]";
    document.body.appendChild(c);
    container = $("toast-container");
  }
  
  const toast = document.createElement("div");
  toast.className = "bg-gray-800 text-white text-sm px-3 py-2 rounded-lg shadow-lg opacity-90";
  toast.textContent = message;
  container.appendChild(toast);
  console.log("[TOAST]", message);
  
  setTimeout(() => {
    if (toast.parentNode) {
      toast.style.opacity = "0";
      toast.style.transition = "opacity 0.3s";
      setTimeout(() => toast.remove(), 300);
    }
  }, duration);
}

  const inputId = label.getAttribute('for');
  const input = document.getElementById(inputId);
  if (!input) return;

function switchTab(tab) {
  // Save form data when leaving add tab (only if NOT in edit mode)
  if (activeTab === "add" && tab !== "add") {
    if (editModeRecord) {
      // Cancel edit mode - clear everything
      editModeRecord = null;
      savedFormData = null;
      updateBottomNavForEditMode(false);
    } else {
      if (skipNextAddFormSave) {
        skipNextAddFormSave = false;
        savedFormData = null;
      } else {
        // Normal tab switch - save form data
        const form = $("incomeForm");
        if (form) {
          savedFormData = {
            date: form.date?.value || "",
            hours: form.hours?.value || "",
            location: form.location?.value || "",
            rate: form.rate?.value || "",
            tips: form.tips?.value || "",
            payType: form.payType?.value || "hourly"
          };
        }
      }
    }
  }
  
  activeTab = tab;
  document.querySelectorAll(".tab").forEach(b => {
    b.classList.toggle("text-indigo-400", b.dataset.tab === tab);
    b.classList.toggle("text-gray-400", b.dataset.tab !== tab);
  });

  // Show/hide monthly banner based on tab
  const banner = $("monthlyBanner");
  if (banner) {
    banner.classList.toggle("hidden", tab !== "history");
  }

  // Add transition effect
  const app = $("app");
  app.style.opacity = "0";
  app.style.transform = "translateX(20px)";
  app.style.transition = "opacity 0.2s, transform 0.2s";
  
  setTimeout(() => {
    if (tab === "dashboard") renderDashboard();
    else if (tab === "add") renderAdd(editModeRecord || savedFormData);
    else if (tab === "history") renderHistory();
    else if (tab === "settings") renderSettings();
    
    // Restore visibility with animation
    app.style.opacity = "1";
    app.style.transform = "translateX(0)";
  }, 150);
}

/* ================================
   DASHBOARD WITH CHARTS
================================= */
function renderDashboard() {
  const data = loadData();
  const records = data.records.filter(r => !r.deleted);
  const defs = data.customFields || [];
  
  // Calculate stats
  const today = new Date();
  const thisMonth = today.toISOString().slice(0, 7);
  
  // This month
  const thisMonthRecords = records.filter(r => r.date && r.date.startsWith(thisMonth));
  const thisMonthTotal = thisMonthRecords.reduce((sum, r) => {
    return sum + calculateRecordTotal(r, defs);
  }, 0);
  const thisMonthHours = thisMonthRecords.reduce((sum, r) => sum + (parseFloat(r.hours) || 0), 0);
  
  // Last month
  const lastMonth = new Date(today.getFullYear(), today.getMonth() - 1, 1);
  const lastMonthStr = lastMonth.toISOString().slice(0, 7);
  const lastMonthRecords = records.filter(r => r.date && r.date.startsWith(lastMonthStr));
  const lastMonthTotal = lastMonthRecords.reduce((sum, r) => {
    return sum + calculateRecordTotal(r, defs);
  }, 0);

  document.body.insertAdjacentHTML("beforeend", menu);
  
  requestAnimationFrame(() => {

    const overlay = $("chartFilterOverlay");
    if (sheet) sheet.classList.remove("translate-y-full");
    if (overlay) overlay.classList.remove("opacity-0");

function closeChartFilter() {
  const sheet = $("chartFilterSheet");
  const overlay = $("chartFilterOverlay");
  
  if (sheet) sheet.classList.add("translate-y-full");
  if (overlay) overlay.classList.add("opacity-0");

    if (sheet) sheet.remove();
  }, 300);
}

function setPayType(type, silent = false) {
  const payType = (type === "flat") ? "flat" : "hourly";
  const input = $("payTypeInput");
  if (input) input.value = payType;
  const label = $("rateLabel");
  if (label) label.textContent = payType === "flat" ? "Flat Amount" : "Hourly Rate";
  // Refresh buttons by re-rendering only if not silent (keeps UI consistent)
  if (!silent) {
    // Lightweight button state update
    const buttons = document.querySelectorAll('button[onclick^="setPayType"]');
    buttons.forEach(b => {
      const isFlatBtn = b.getAttribute("onclick")?.includes("'flat'");
      const active = (payType === "flat") === isFlatBtn;
      b.classList.toggle("bg-indigo-600", active);
      b.classList.toggle("text-white", active);
      b.classList.toggle("bg-gray-700", !active);
      b.classList.toggle("text-gray-300", !active);
    });
  }
}

function setupCustomFields() {
  const section = $("customFieldsSection");
  if (!section) return;
  
  const data = loadData();
  const customFields = data.customFields || [];
  
  if (customFields.length === 0) {
    section.innerHTML = '';
    return;
  }
  
  section.innerHTML = customFields.map((field, index) => {
    const fieldId = `custom_${index}`;
    const existingValue = editModeRecord ? editModeRecord[field.key] : '';
    const hasValue = existingValue && existingValue.length > 0;
    
    if (field.type === 'checkbox') {
      return `
        <div class="flex items-center gap-2">
          <input type="checkbox" name="${fieldId}" id="${fieldId}" ${existingValue ? 'checked' : ''} class="w-5 h-5 accent-indigo-500 bg-gray-800 rounded border border-gray-600" onchange="updateCustomFieldLabel('${fieldId}')">
          <label for="${fieldId}" class="text-gray-300 select-none">${field.label}</label>
        </div>
      `;
    } else if (field.type === 'number') {
      return `
        <div class="relative">
          <input type="number" name="${fieldId}" id="${fieldId}" value="${existingValue}" 
            class="w-full p-3 bg-gray-800 rounded peer" placeholder=" " oninput="updateCustomFieldLabel('${fieldId}')">
          <label id="${fieldId}_label" for="${fieldId}" class="absolute left-3 top-3 text-gray-400 text-sm pointer-events-none transition-all duration-200 ${hasValue ? '-translate-y-2 top-0 text-xs text-indigo-400' : ''}">${field.label}</label>
        </div>
      `;
    } else if (field.type === 'money') {
      return `
        <div class="relative">
          <div class="absolute left-3 top-3 text-gray-400 text-sm pointer-events-none">$</div>
          <input type="number" step="0.01" name="${fieldId}" id="${fieldId}" value="${existingValue}"
            class="w-full p-3 pl-8 bg-gray-800 rounded peer" placeholder=" " oninput="updateCustomFieldLabel('${fieldId}')">
          <label id="${fieldId}_label" for="${fieldId}" class="absolute left-8 top-3 text-gray-400 text-sm pointer-events-none transition-all duration-200 ${hasValue ? '-translate-y-2 top-0 text-xs text-indigo-400' : ''}">${field.label}</label>
        </div>
      `;
    } else if (field.type === 'date') {
      return `
        <div class="relative">
          <input type="date" name="${fieldId}" id="${fieldId}" value="${existingValue}"
            class="w-full p-3 bg-transparent text-gray-100 appearance-none" onchange="updateCustomFieldLabel('${fieldId}')">
          <label id="${fieldId}_label" for="${fieldId}" class="absolute left-3 top-3 text-gray-400 text-sm pointer-events-none transition-all duration-200 ${hasValue ? '-translate-y-2 top-0 text-xs text-indigo-400' : ''}">${field.label}</label>
        </div>
      `;
    } else if (field.type === 'longtext') {
      return `
        <div>
          <label class="text-xs text-gray-400 mb-1 block">${field.label}</label>
          <textarea name="${fieldId}" id="${fieldId}" rows="4"
            class="w-full p-3 bg-gray-800 rounded text-white text-sm resize-none" placeholder="Enter notes...">${existingValue ? String(existingValue).replace(/</g, '&lt;') : ''}</textarea>
        </div>
      `;
    } else {
      // Default to text input
      return `
        <div class="relative">
          <input type="text" name="${fieldId}" id="${fieldId}" value="${existingValue}"
            class="w-full p-3 bg-gray-800 rounded peer" placeholder=" " oninput="updateCustomFieldLabel('${fieldId}')">
          <label id="${fieldId}_label" for="${fieldId}" class="absolute left-3 top-3 text-gray-400 text-sm pointer-events-none transition-all duration-200 ${hasValue ? '-translate-y-2 top-0 text-xs text-indigo-400' : ''}">${field.label}</label>
        </div>
      `;
    }
  }).join('');
  
  // Initialize labels after render
  setTimeout(() => {
    customFields.forEach((field, index) => {
      const fieldId = `custom_${index}`;
      updateCustomFieldLabel(fieldId);
    });
  }, 50);
}

function updateCustomFieldLabel(fieldId) {
  const input = document.getElementById(fieldId);
  const label = document.getElementById(fieldId + '_label');
  if (!input || !label) return;
  
  const hasValue = input.type === 'checkbox' 
    ? input.checked 
    : (input.value && input.value.length > 0);
  
  if (hasValue) {
    label.classList.add('-translate-y-2', 'top-0', 'text-xs', 'text-indigo-400');
    label.classList.remove('top-3', 'text-gray-400', 'text-sm');
  } else {
    label.classList.remove('-translate-y-2', 'top-0', 'text-xs', 'text-indigo-400');
    label.classList.add('top-3', 'text-gray-400', 'text-sm');
  }
}

function saveCustomField() {
  const name = $("customFieldName").value.trim();
  const type = $("customFieldType").value;
  
  if (!name) {
    showToast("Please enter a field name", 2000);
    return;
  }
  if (name.length > 24) {
    showToast("Field name must be 24 characters or less", 2500);
    return;
  }

  const data = loadData();
  if (!data.customFields) data.customFields = [];

  // Create field key (sanitized for storage)
  const fieldKey = "CustomField_" + name.replace(/[^a-zA-Z0-9]/g, "_");
  
  const addToTotal = type === "money"
    ? (document.querySelector('input[name="moneyAddToTotal"]:checked')?.value || "none")
    : undefined;

  data.customFields.push({
    label: name,
    type: type,
    key: fieldKey,
    ...(type === "money" ? { addToTotal } : {})
  });
  
  saveData(data);
  closeCustomFieldMenu();
  showToast(`Added "${name}" field`, 2000);
  
  // Re-render the add form to show new field
  renderAdd(editModeRecord || savedFormData);
}

/* Location Autocomplete */
function setupLocationAutocomplete() {
  const data = loadData();
  const input = $("locationInput");
  const dropdown = $("locationDropdown");

  // Trigger label animation on input
  input.oninput = () => {
    updateLabel('locationLabel');
    
    const value = input.value.toLowerCase();
    const matches = Object.keys(data.locations)
      .filter(loc => loc.toLowerCase().includes(value));

    if (!value || matches.length === 0) {
      dropdown.classList.add("hidden");
      return;
    }

    dropdown.innerHTML = matches.map(m =>
      `<div class="p-2 hover:bg-gray-700 cursor-pointer">${m}</div>`
    ).join("");

    dropdown.classList.remove("hidden");

    dropdown.querySelectorAll("div").forEach(div => {
      div.onclick = () => {
        input.value = div.textContent;
        updateLabel('locationLabel');
        autoFillRate(div.textContent);
        dropdown.classList.add("hidden");
      };
    });
  };

  input.onblur = () => setTimeout(() => dropdown.classList.add("hidden"), 200);
}

/* Auto-fill rate based on last saved location rate */
function autoFillRate(location) {

    updateLabel('rateLabel');

function saveIncome(form, existing) {
  debug("saveIncome called - START");
  
  // Check localStorage is available
  try {
    localStorage.setItem("test", "test");
    localStorage.removeItem("test");
    debug("localStorage is available");
  } catch (e) {
    debug("ERROR: localStorage not available: " + e.message);
    showToast("localStorage not available!", 5000);
    return;
  }
  
  const data = loadData();
  const now = Date.now();

  const location = form.get("location");
  const rate = Number(form.get("rate"));
  const hours = Number(form.get("hours"));
  const tips = Number(form.get("tips"));
  const date = form.get("date");

  debug(`Form data: date=${date}, hours=${hours}, rate=${rate}, tips=${tips}, location=${location}`);

  if (!location || !hours || !rate || hours <= 0 || rate <= 0) {
    debug("ERROR: Missing required fields!");
    showToast("Please fill in hours, rate, and location", 3000);
    return;
  }

  debug("Validation passed, about to save location");

  // Ensure locations object exists
  if (!data.locations) {
    data.locations = {};
    debug("Initialized data.locations");
  }

  try {
    if (!data.locations[location]) {
      data.locations[location] = { lastRate: rate, preferredColor: null };
    } else {
      data.locations[location] = {
        ...data.locations[location],
        lastRate: rate
      };
    }
    debug("Location saved successfully");
  } catch (e) {
    debug("ERROR saving location: " + e.message);
    showToast("Error saving location: " + e.message, 5000);
    return;
  }

  debug(`Records before push: ${data.records.length}`);

  const tipsNum = Number(form.get("tips")) || 0;
  const payType = form.get("payType") === "flat" ? "flat" : "hourly";
  
  // Get custom field values - store with field.key as the key
  const customFields = data.customFields || [];
  const customFieldData = {};
  customFields.forEach((field, index) => {
    const inputId = `custom_${index}`;
    let value = form.get(inputId);
    
    // Handle checkbox
    const input = document.getElementById(inputId);
    if (field.type === 'checkbox' && input) {
      value = input.checked ? 'true' : 'false';
    }
    
    if (value !== null && value !== "") {
      customFieldData[field.key] = value;
    }
  });

  if (existing) {
    // Use both id AND createdAt to find the exact record — prevents matching
    // a duplicate-ID record that was created before a meta reset.
    const recordIndex = existing.createdAt
      ? data.records.findIndex(r => r.id === existing.id && r.createdAt === existing.createdAt)
      : data.records.findIndex(r => r.id === existing.id);
    debug(`Updating record at index: ${recordIndex}, id: ${existing.id}`);
    
    if (recordIndex >= 0) {
      data.records[recordIndex] = {
        ...data.records[recordIndex],
        date: form.get("date"),
        hours: hours,
        rate: rate,
        tips: tipsNum,
        location,
        payType,
        ...customFieldData,
        updatedAt: now
      };
    }
  } else {
    data.records.push({
      id: generateId(),
      date: form.get("date"),
      hours: hours,
      rate: rate,
      tips: tipsNum,
      location,
      payType,
      ...customFieldData,
      deleted: false,
      createdAt: now,
      updatedAt: now
    });
  }

  try {
    saveData(data);
    showToast(editModeRecord ? "Entry updated! ✅" : "Entry added! ✅", 2000);
    
    // Clear edit mode and form data
    if (editModeRecord) {
      editModeRecord = null;
      savedFormData = null; // Clear saved form data too
      updateBottomNavForEditMode(false);
    }
  } catch (e) {
    showToast("Error saving data: " + e.message, 5000);
    return;
  }
  
  // Avoid persisting the just-submitted form values into savedFormData
  savedFormData = null;
  skipNextAddFormSave = true;
  editModeRecord = null;
  updateBottomNavForEditMode(false);
  switchTab("history");
}

/* Delete a record (soft delete) with confirmation */
function deleteRecord(id, createdAt) {
  const data = loadData();
  const record = createdAt
    ? data.records.find(r => r.id === id && r.createdAt === createdAt)
    : data.records.find(r => r.id === id);
  if (!record) return;
  
  // Show confirmation
  if (confirm('Delete this entry?')) {
    record.deleted = true;
    record.updatedAt = Date.now();
    saveData(data);
    showToast("Entry deleted", 2000);
    renderHistory();
  }
}

/* Restore a deleted record */
function restoreRecord(id, createdAt) {
  const data = loadData();
  const record = createdAt
    ? data.records.find(r => r.id === id && r.createdAt === createdAt)
    : data.records.find(r => r.id === id);
  if (record) {
    record.deleted = false;
    record.updatedAt = Date.now();
    saveData(data);
    showToast("Entry restored", 2000);
    renderHistory();
  }
}

/* Toggle showing deleted records */
function toggleDeletedRecords() {
  showDeletedRecords = !showDeletedRecords;
  renderHistory();
}

/* Edit a record */
function editRecord(id, createdAt) {
  debug("Editing record: " + id);
  const data = loadData();
  const record = createdAt
    ? data.records.find(r => r.id === id && r.createdAt === createdAt)
    : data.records.find(r => r.id === id);
  if (record) {
    switchTab("add");
    // Need to render add form with existing data
    setTimeout(() => renderAdd(record), 100);
  }
}

  type: "all", // "all", "month", "range", "ytd", "past3months"

};

function getFilteredRecords(records) {
  const today = new Date();
  const currentYear = today.getFullYear();
  const currentMonth = today.getMonth();
  
  let startDate, endDate;
  
  if (dateFilter.type === "month") {
    // Current month
    startDate = new Date(currentYear, currentMonth, 1);
    endDate = new Date(currentYear, currentMonth + 1, 0);
  } else if (dateFilter.type === "ytd") {
    startDate = new Date(currentYear, 0, 1);
    endDate = today;
  } else if (dateFilter.type === "past3months") {
    startDate = new Date(currentYear, currentMonth - 3, 1);
    endDate = today;
  } else if (dateFilter.type === "range" && dateFilter.startDate && dateFilter.endDate) {
    startDate = new Date(dateFilter.startDate);
    endDate = new Date(dateFilter.endDate);
  } else {
    // Default to current month
    startDate = new Date(currentYear, currentMonth, 1);
    endDate = new Date(currentYear, currentMonth + 1, 0);
  }
  
  const startStr = startDate.toISOString().split("T")[0];
  const endStr = endDate.toISOString().split("T")[0];
  
  return records.filter(r => r.date >= startStr && r.date <= endStr);
}

function renderHistory() {
  // Reset loaded months when entering history (only if not a scroll load)
  if (!isScrollLoad) {
    loadedMonths = 2;
  }
  isScrollLoad = false;
  
  const allData = loadData();
  const defs = allData.customFields || [];
  
  // Get all non-deleted records sorted by date (newest first)
  let records = showDeletedRecords 
    ? allData.records.filter(r => r.deleted)
    : allData.records.filter(r => !r.deleted);
    
  // Sort all records by date descending
  records = applyHistorySort(records, defs);
  
  // Store for scroll loading
  allRecords = records;
  
  // Check if we have a date filter active (not "All Time")
  const isFiltered = dateFilter && dateFilter.type !== 'all';
  
  // If filtered, calculate date range
  let startDate = null;
  let endDate = null;
  if (isFiltered) {
    const today = new Date();
    const currentYear = today.getFullYear();
    const currentMonth = today.getMonth();
    
    if (dateFilter.type === "month") {
      startDate = new Date(currentYear, currentMonth, 1);
      endDate = new Date(currentYear, currentMonth + 1, 0);
    } else if (dateFilter.type === "ytd") {
      startDate = new Date(currentYear, 0, 1);
      endDate = today;
    } else if (dateFilter.type === "past3months") {
      startDate = new Date(currentYear, currentMonth - 3, 1);
      endDate = today;
    } else if (dateFilter.type === "range" && dateFilter.startDate && dateFilter.endDate) {
      startDate = new Date(dateFilter.startDate);
      endDate = new Date(dateFilter.endDate);
    }
  }
  
  // Filter by date if range is set
  if (startDate && endDate) {
    const startStr = startDate.toISOString().split("T")[0];
    const endStr = endDate.toISOString().split("T")[0];
    records = records.filter(r => r.date >= startStr && r.date <= endStr);
  }

  // Apply custom field filters after date filtering
  records = applyCustomFilters(records, defs, historyFilters);

  // Re-apply sort after filtering (keeps order stable)
  records = applyHistorySort(records, defs);
  
  // Group all filtered records by month
  const byMonth = {};
  records.forEach(r => {
    const monthKey = r.date.substring(0, 7); // "2026-02"
    if (!byMonth[monthKey]) byMonth[monthKey] = [];
    byMonth[monthKey].push(r);
  });
  
  // Get sorted month keys
  const months = Object.keys(byMonth).sort((a, b) => b.localeCompare(a));
  
  // Calculate totals for first loaded months (or all if filtered)
  let loadedRecords = [];
  if (isFiltered) {
    // If filtered, show all months at once
    loadedRecords = records;
  } else {
    // If not filtered (infinity), show one month at a time
    for (let i = 0; i < Math.min(loadedMonths, months.length); i++) {
      loadedRecords.push(...byMonth[months[i]]);
    }
  }
  
  const totalIncome = loadedRecords.reduce((sum, r) => sum + calculateRecordTotal(r, defs), 0);
  const totalTips = loadedRecords.reduce((sum, r) => sum + r.tips, 0);
  const totalHours = loadedRecords.reduce((sum, r) => sum + r.hours, 0);
  
  const formatDate = (isoDate) => {
    const [y, m, d] = isoDate.split("-");
    const date = new Date(y, m - 1, d);
    return date.toDateString();
  };

  const formatMonth = (monthKey) => {
    const [year, month] = monthKey.split('-');
    const date = new Date(year, month - 1, 1);
    return date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
  };

  // Calculate month totals for banner
  const monthTotals = {};
  months.forEach(m => {
    monthTotals[m] = byMonth[m].reduce((sum, r) => sum + calculateRecordTotal(r, defs), 0);
  });

  $("app").innerHTML = `

    <div class="p-4 space-y-2">
      <div class="flex justify-between items-center">
        <div class="text-center text-xs text-gray-400">${dateFilter.label}</div>
        <div class="flex items-center gap-3">

            <span>Filters</span>

            })()}

          ${countActiveCustomFilters(historyFilters) ? `<button onclick="clearHistoryFiltersQuick()" class="text-[11px] text-gray-500 hover:text-gray-300">Clear</button>` : ''}
          <button onclick="toggleDeletedRecords()" class="text-xs ${showDeletedRecords ? 'text-red-400' : 'text-gray-500'}">
            ${showDeletedRecords ? '✓ Showing Deleted' : 'Show Deleted'}
          </button>
        </div>
      </div>
      ${!showDeletedRecords ? `
      <div class="text-2xl font-bold text-left">${money(totalIncome)}</div>
      <div class="flex justify-between text-sm">
        <span class="text-gray-400">${totalHours.toFixed(1)} hrs</span>
        <span class="text-gray-400">Tips: ${money(totalTips)}</span>

    </div>
    
    <!-- Entries with infinite scroll -->
    <div id="historyList" class="p-4 space-y-6">
      ${months.slice(0, loadedMonths).map(month => `

          </div>
          ${byMonth[month].map(r => {
            // Group by date within month
            const totalForShift = calculateRecordTotal(r, defs);

function showShiftDetail(id, createdAt) {
  const data = loadData();
  const defs = getCustomFieldDefs();
  const r = createdAt
    ? data.records?.find(rec => rec.id === id && rec.createdAt === createdAt)
    : data.records?.find(rec => rec.id === id);
  if (!r) return;

  const formatDate = (isoDate) => {
    const [y, m, d] = isoDate.split("-");
    return new Date(y, m - 1, d).toDateString();
  };

  const basePay = calculateBasePay(r);
  const tips = parseFloat(r.tips) || 0;
  const total = calculateRecordTotal(r, defs);

  const moneyDefs = defs.filter(d => d.type === 'money' && r[d.key] != null && r[d.key] !== '');
  const otherDefs = defs.filter(d => d.type !== 'money' && d.type !== 'longtext' && r[d.key] != null && r[d.key] !== '' && !(d.type === 'checkbox' && r[d.key] !== 'true' && r[d.key] !== true && r[d.key] !== 1 && r[d.key] !== '1'));
  const longDefs = defs.filter(d => d.type === 'longtext' && r[d.key] != null && r[d.key] !== '');

  let breakdownRows = '';
  if (r.payType === 'flat') {
    breakdownRows += `<div class="flex justify-between text-sm py-1"><span class="text-gray-400">Flat Rate</span><span>${money(parseFloat(r.rate) || 0)}</span></div>`;
  } else {
    breakdownRows += `<div class="flex justify-between text-sm py-1"><span class="text-gray-400">${r.hours}h × ${money(parseFloat(r.rate) || 0)}/hr</span><span>${money(basePay)}</span></div>`;
  }
  if (tips > 0) {
    breakdownRows += `<div class="flex justify-between text-sm py-1"><span class="text-gray-400">Tips</span><span class="text-green-400">+${money(tips)}</span></div>`;
  }
  moneyDefs.forEach(def => {
    const v = parseFloat(r[def.key]);
    if (!Number.isFinite(v)) return;
    const mode = def.addToTotal || 'none';
    const abs = Math.abs(v);
    const color = mode === 'add' ? 'text-green-400' : mode === 'subtract' ? 'text-red-400' : 'text-gray-300';
    const sign = mode === 'add' ? '+' : mode === 'subtract' ? '−' : '';
    breakdownRows += `<div class="flex justify-between text-sm py-1"><span class="text-gray-400">${def.label}</span><span class="${color}">${sign}${money(abs)}</span></div>`;
  });

  const otherRows = otherDefs.map(def => {
    let val = r[def.key];
    if (def.type === 'checkbox') val = '✓';
    if (def.type === 'date') { try { const [y,m,d] = val.split('-'); val = new Date(y,m-1,d).toDateString(); } catch {} }
    return `<div class="flex justify-between text-sm py-1"><span class="text-gray-400">${def.label}</span><span class="text-gray-200 text-right ml-4 max-w-[55%] truncate">${val}</span></div>`;
  }).join('');

  const longRows = longDefs.map(def => `
    <div>
      <div class="text-xs text-gray-400 mb-1 font-medium">${def.label}</div>
      <div class="text-sm text-gray-200 whitespace-pre-wrap bg-gray-950/50 rounded-lg p-3 leading-relaxed">${String(r[def.key]).replace(/&/g,'&amp;').replace(/</g,'&lt;')}</div>
    </div>
  `).join('');

  const locColor = normalizeHexColor(data.locations?.[r.location]?.preferredColor);
  const dotStyle = locColor ? `style="background:${locColor}"` : 'style="background:#4b5563"';

  const sheet = `
    <div id="shiftDetailOverlay" class="fixed inset-0 bg-black/60 z-40" onclick="closeShiftDetail()"></div>

        </div>

  `;

  const existing = $("shiftDetailSheet");
  if (existing) existing.remove();
  const existingOverlay = $("shiftDetailOverlay");
  if (existingOverlay) existingOverlay.remove();

  document.body.insertAdjacentHTML("beforeend", sheet);
  requestAnimationFrame(() => {
    const s = $("shiftDetailSheet");
    const o = $("shiftDetailOverlay");
    if (s) s.classList.remove("translate-y-full");
  });
}

function closeShiftDetail() {
  const sheet = $("shiftDetailSheet");
  const overlay = $("shiftDetailOverlay");
  if (sheet) sheet.classList.add("translate-y-full");
  setTimeout(() => {
    if (sheet) sheet.remove();
    if (overlay) overlay.remove();
  }, 300);
}

function setupInfiniteScroll(months, monthTotals) {
  // Remove any existing scroll listeners first
  window.removeEventListener('scroll', handleHistoryScroll);
  
  // Use simple scroll event instead of IntersectionObserver
  window.addEventListener('scroll', handleHistoryScroll);
}

function handleHistoryScroll() {
  // Only run if we're on history tab
  if (activeTab !== 'history') return;
  
  const scrollTop = window.scrollY || document.documentElement.scrollTop;
  const scrollHeight = document.documentElement.scrollHeight;
  const clientHeight = document.documentElement.clientHeight;
  
  console.log('Scroll check:', { scrollTop, clientHeight, scrollHeight, loadedMonths });
  
  // When user scrolls within 150px of bottom
  if (scrollTop + clientHeight >= scrollHeight - 150) {
    // Get months from data
    const allData = loadData();
    let records = showDeletedRecords 
      ? allData.records.filter(r => r.deleted)
      : allData.records.filter(r => !r.deleted);
    records.sort((a, b) => b.date.localeCompare(a.date));
    
    const byMonth = {};
    records.forEach(r => {
      const monthKey = r.date.substring(0, 7);
      if (!byMonth[monthKey]) byMonth[monthKey] = [];
      byMonth[monthKey].push(r);
    });
    const months = Object.keys(byMonth).sort((a, b) => b.localeCompare(a));
    
    console.log('Loaded months:', loadedMonths, 'Total months:', months.length);
    
    if (loadedMonths < months.length) {
      isScrollLoad = true;
      loadedMonths++;
      console.log('Loading more months:', loadedMonths);
      renderHistory();
    }
  }
}

function updateBannerForVisibleMonth() {
  const months = document.querySelectorAll('.month-group');
  if (months.length === 0) return;
  
  const observer = new IntersectionObserver((entries) => {
    let maxVisibleMonth = null;
    let maxVisibleRatio = 0;
    
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const ratio = entry.intersectionRatio;
        if (ratio > maxVisibleRatio) {
          maxVisibleRatio = ratio;
          maxVisibleMonth = entry.target;
        }
      }
    });
    
    if (maxVisibleMonth) {
      const total = maxVisibleMonth.dataset.total;
      const month = maxVisibleMonth.dataset.month;
      const [year, mon] = month.split('-');
      const date = new Date(year, mon - 1, 1);
      const monthName = date.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      
      $("monthlyBannerValue").textContent = money(parseFloat(total));
      $("dateFilterLabel").textContent = monthName;
    }
  }, { threshold: 0.1 });
  
  months.forEach(m => observer.observe(m));
}

function updateMonthlyTotal(records) {
  const defs = getCustomFieldDefs();
  const total = records.reduce((s,r)=>s + calculateRecordTotal(r, defs), 0);
  $("monthlyBannerValue").textContent = money(total);
  
  // Update the label and indicator
  const labelEl = $("dateFilterLabel");
  const indicatorEl = $("filterIndicator");
  if (labelEl) {
    labelEl.textContent = dateFilter.label;
  }
  if (indicatorEl) {
    if (dateFilter.type === 'all') {
      indicatorEl.textContent = '∞';
    } else if (dateFilter.type === 'ytd') {
      indicatorEl.textContent = '📅';
    } else if (dateFilter.type === 'month') {
      indicatorEl.textContent = '📆';
    } else if (dateFilter.type === 'past3months') {
      indicatorEl.textContent = '3';
    } else if (dateFilter.type === 'range') {
      indicatorEl.textContent = '📋';
    }
  }
}

function saveLocationEdit(oldName) {
  const newName = $("locEditName")?.value?.trim();
  const chosen = document.querySelector('input[name="locColor"]:checked')?.value || "";
  const preferredColor = normalizeHexColor(chosen);

  if (!newName) {
    showToast("Location name is required", 2000);
    return;
  }

  const data = loadData();
  if (!data.locations || !data.locations[oldName]) {
    showToast("Location not found", 2000);
    closeLocationEditMenu();
    return;
  }

  const oldMeta = data.locations[oldName] || {};
  const nextMeta = { ...oldMeta, preferredColor: preferredColor };

  if (newName !== oldName) {
    if (data.locations[newName]) {
      showToast("That name already exists", 2200);
      return;
    }
    data.locations[newName] = nextMeta;
    delete data.locations[oldName];
    data.records.forEach(r => {
      if (r.location === oldName) {
        r.location = newName;
        r.updatedAt = Date.now();
      }
    });
  } else {
    data.locations[oldName] = nextMeta;
  }

  saveData(data);
  closeLocationEditMenu();
  showToast("Location updated", 1500);
  renderSettings();
  try { renderHistory(); } catch {}
  try { renderAllCharts(); } catch {}
}

function renameLocation(oldName) {
  const newName = prompt("Enter new name for '" + oldName + "':");
  if (newName && newName !== oldName) {
    const data = loadData();
    // Update location rate
    const rate = data.locations[oldName].lastRate;
    const preferredColor = normalizeHexColor(data.locations[oldName].preferredColor);
    data.locations[newName] = { lastRate: rate, preferredColor: preferredColor };
    delete data.locations[oldName];
    
    // Update all records with this location
    data.records.forEach(r => {
      if (r.location === oldName) {
        r.location = newName;
        r.updatedAt = Date.now();
      }
    });
    
    saveData(data);
    showToast("Location renamed!", 2000);
    renderSettings();
  }
}

function showMergeLocations() {
  const data = loadData();
  const locations = Object.keys(data.locations || {});
  
  if (locations.length < 2) {
    showToast("Need at least 2 locations to merge", 2000);
    return;
  }
  
  const from = prompt("Enter source location to merge FROM:");
  const to = prompt("Enter destination location to merge TO:");
  
  if (from && to && from !== to && data.locations[from] && data.locations[to]) {
    // Merge: update all records from 'from' to 'to'
    let count = 0;
    data.records.forEach(r => {
      if (r.location === from) {
        r.location = to;
        r.updatedAt = Date.now();
        count++;
      }
    });
    
    // Delete the source location
    delete data.locations[from];
    
    saveData(data);
    showToast(`Merged ${count} records to "${to}"`, 3000);
    renderSettings();
  } else {
    showToast("Invalid location names", 2000);
  }
}

function exportData() {
  const data = loadData();
  
  // Ask user which format
  const format = prompt('Export as JSON or CSV? (type: json or csv)', 'json');
  
  if (format && format.toLowerCase() === 'csv') {
    exportAsCSV(data);
  } else {
    // Original JSON export
    const text = JSON.stringify(data, null, 2);
    if (navigator.share) {
      navigator.share({ text: text }).then(() => {
        showToast("Shared!", 2000);
      }).catch(err => {
        console.log("Share cancelled or failed", err);
        copyToClipboard(text);
      });
    } else {
      copyToClipboard(text);
    }
  }
}

function exportAsCSV(data) {
  const records = data.records.filter(r => !r.deleted);
  const defs = data.customFields || [];
  
  // CSV header
  let csv = 'Date,Hours,Rate,PayType,Location,Tips,Total\n';
  
  // Add rows
  records.forEach(r => {
    const total = calculateRecordTotal(r, defs);
    csv += `${r.date},${r.hours},${r.rate},${r.payType || 'hourly'},"${r.location}",${r.tips},${total.toFixed(2)}\n`;
  });
  
  // Add summary at end
  const totalHours = records.reduce((s, r) => s + r.hours, 0);
  const totalTips = records.reduce((s, r) => s + r.tips, 0);
  const totalIncome = records.reduce((s, r) => s + calculateRecordTotal(r, defs), 0);
  
  csv += `\nSummary\n`;
  csv += `Total Hours,${totalHours.toFixed(2)}\n`;
  csv += `Total Tips,${totalTips.toFixed(2)}\n`;
  csv += `Total Income,${totalIncome.toFixed(2)}\n`;
  
  if (navigator.share) {
    navigator.share({ text: csv }).then(() => {
      showToast("Shared CSV!", 2000);
    }).catch(err => {
      copyToClipboard(csv);
    });
  } else {
    copyToClipboard(csv);
  }
}

function copyToClipboard(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(() => {
      showToast("Copied to clipboard!", 2000);
    }).catch(() => {
      prompt("Copy this JSON:", text);
    });
  } else {
    prompt("Copy this JSON:", text);
  }
}

function importData() {
  try {
    const raw = $("importArea").value;
    const parsed = JSON.parse(raw);

    if (!parsed.records || !Array.isArray(parsed.records)) {
      alert("Invalid format.");
      return;
    }

    saveData(parsed);

    // After import, advance income_meta.nextId past the highest existing ID
    // so newly-created records never collide with imported ones.
    const meta = loadMeta();
    const maxSuffix = parsed.records.reduce((max, r) => {
      const m = r.id && r.id.match(/_(\d+)$/);
      return m ? Math.max(max, parseInt(m[1], 10)) : max;
    }, 0);
    if (maxSuffix >= meta.nextId) {
      meta.nextId = maxSuffix + 1;
      saveMeta(meta);
    }

    alert("Import successful.");
    switchTab("history");
  } catch (e) {
    alert("Invalid JSON.");
  }
}

/* ================================
   DATA CLEANUP / HEALTH CHECK
   ================================ */

function detectDataIssues(data) {
  // Find duplicate IDs
  const idCount = {};
  for (const r of data.records) {
    if (!r.id) continue;
    idCount[r.id] = (idCount[r.id] || 0) + 1;
  }
  const dups = {};
  for (const r of data.records) {
    if (r.id && idCount[r.id] > 1) {
      if (!dups[r.id]) dups[r.id] = [];
      dups[r.id].push(r);
    }
  }
  // Find other issues
  const other = [];
  for (const r of data.records) {
    const problems = [];
    if (!r.payType) problems.push('Missing pay type');
    if (r.createdAt == null) problems.push('Missing creation timestamp');
    if (r.hours != null && isNaN(parseFloat(r.hours))) problems.push('Invalid hours value');
    if (r.rate != null && isNaN(parseFloat(r.rate))) problems.push('Invalid rate value');
    if (r.tips != null && isNaN(parseFloat(r.tips))) problems.push('Invalid tips value');
    if (problems.length) other.push({ record: r, problems });
  }
  return { duplicateIds: dups, otherIssues: other };
}

function showDataCleanup() {
  ['cleanDataSheet', 'cleanDataOverlay'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.remove();
  });
  document.body.insertAdjacentHTML('beforeend', `
    <div id="cleanDataOverlay" class="fixed inset-0 bg-black/60 z-40" onclick="closeCleanDataMenu()"></div>
    <div id="cleanDataSheet" class="fixed bottom-0 inset-x-0 bg-gray-900 rounded-t-2xl z-50 max-h-[90vh] overflow-y-auto transform transition-transform duration-300 translate-y-full">
      <div class="w-10 h-1 bg-gray-700 rounded-full mx-auto mt-3 mb-1"></div>
      <div id="cleanDataContent" class="p-4 space-y-4 pb-10"></div>
    </div>
  `);
  requestAnimationFrame(() => {
    const s = document.getElementById('cleanDataSheet');
    if (s) s.classList.remove('translate-y-full');
    const data = loadData();
    const issues = detectDataIssues(data);
    if (Object.keys(issues.duplicateIds).length > 0) {
      _renderCleanScreen1(issues);
    } else if (issues.otherIssues.length > 0) {
      _renderCleanScreen2(issues, 0);
    } else {
      _renderCleanDone(0, 0);
    }
  });
}

function _renderCleanScreen1(issues) {
  const groups = Object.entries(issues.duplicateIds);
  let rows = '';
  for (const [id, recs] of groups) {
    const recItems = recs.map(r => {
      const amt = r.amount != null ? `$${parseFloat(r.amount).toFixed(2)}` : '—';
      const status = r.deleted
        ? '<span class="text-red-400">deleted</span>'
        : '<span class="text-emerald-400">active</span>';
      return `<div class="flex items-center justify-between text-xs text-gray-300 bg-gray-900/50 rounded-lg px-3 py-2">
        <span>${r.date || '—'} · ${r.location || '—'} · ${amt}</span>
        ${status}
      </div>`;
    }).join('');
    rows += `<div class="bg-gray-800/60 border border-gray-700/40 rounded-xl p-3 space-y-2">
      <div class="text-xs font-mono text-amber-400 truncate">${id}</div>
      ${recItems}
    </div>`;
  }
  document.getElementById('cleanDataContent').innerHTML = `
    <div class="flex items-center justify-between">
      <div class="text-lg font-bold">Duplicate Record IDs</div>
      <button onclick="closeCleanDataMenu()" class="text-xs text-gray-400 py-1 px-2">Close</button>
    </div>
    <div class="text-sm text-gray-400">${groups.length} ID${groups.length !== 1 ? 's' : ''} shared by multiple records. This can cause edits and deletes to target the wrong record.</div>
    <div class="space-y-3">${rows}</div>
    <button onclick="_cleanAutoFixDups()" class="w-full bg-indigo-600 hover:bg-indigo-500 p-3 rounded-xl font-semibold">Fix All Automatically</button>
    <button onclick="_cleanSkipDups()" class="w-full bg-gray-800 hover:bg-gray-700 p-3 rounded-xl text-gray-300">Skip</button>
  `;
}

function _cleanAutoFixDups() {
  const data = loadData();
  // Track which IDs we've seen — reassign all but first occurrence
  const seen = {};
  let fixed = 0;
  for (const r of data.records) {
    if (!r.id) continue;
    if (seen[r.id]) {
      r.id = generateId();
      fixed++;
    } else {
      seen[r.id] = true;
    }
  }
  saveData(data);
  const issues = detectDataIssues(data);
  if (issues.otherIssues.length > 0) {
    _renderCleanScreen2(issues, fixed);
  } else {
    _renderCleanDone(fixed, 0);
  }
}

function _cleanSkipDups() {
  const data = loadData();
  const issues = detectDataIssues(data);
  if (issues.otherIssues.length > 0) {
    _renderCleanScreen2(issues, 0);
  } else {
    _renderCleanDone(0, 0);
  }
}

function _renderCleanScreen2(issues, fixedDups) {
  const items = issues.otherIssues;
  let cards = '';
  for (const { record: r, problems } of items) {
    const amt = r.amount != null ? `$${parseFloat(r.amount).toFixed(2)}` : '—';
    const idEsc = (r.id || '').replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    const cAt = r.createdAt || 0;
    const problemList = problems.map(p => `<div class="text-amber-400">• ${p}</div>`).join('');
    cards += `
      <div class="bg-gray-800/60 border border-gray-700/40 rounded-xl p-3 space-y-2">
        <div class="flex items-center justify-between text-xs text-gray-300">
          <span>${r.date || '—'} · ${r.location || '—'} · ${amt}</span>
          ${r.deleted ? '<span class="text-red-400 text-[10px]">deleted</span>' : ''}
        </div>
        <div class="text-[11px] space-y-0.5">${problemList}</div>
        <div class="flex gap-2 pt-1">
          <button onclick="_cleanFixRecord('${idEsc}',${cAt},${fixedDups})" class="flex-1 bg-indigo-600/80 hover:bg-indigo-600 py-1.5 rounded-lg text-xs font-semibold">Fix</button>
          <button onclick="_cleanDeleteRecord('${idEsc}',${cAt},${fixedDups})" class="flex-1 bg-red-700/60 hover:bg-red-700 py-1.5 rounded-lg text-xs text-red-200">Delete</button>
        </div>
      </div>`;
  }
  document.getElementById('cleanDataContent').innerHTML = `
    <div class="flex items-center justify-between">
      <div class="text-lg font-bold">Other Data Issues</div>
      <button onclick="closeCleanDataMenu()" class="text-xs text-gray-400 py-1 px-2">Close</button>
    </div>
    <div class="text-sm text-gray-400">${items.length} record${items.length !== 1 ? 's' : ''} with data issues found.</div>
    <button onclick="_cleanFixAllOther(${fixedDups})" class="w-full bg-indigo-600 hover:bg-indigo-500 p-3 rounded-xl font-semibold">Fix All Automatically</button>
    <div class="space-y-3">${cards}</div>
    <button onclick="_renderCleanDone(${fixedDups}, 0)" class="w-full bg-gray-800 hover:bg-gray-700 p-3 rounded-xl text-gray-400 text-sm">Done</button>
  `;
}

function _cleanFixRecord(id, createdAt, fixedDups) {
  const data = loadData();
  const r = createdAt
    ? data.records.find(rec => rec.id === id && rec.createdAt === createdAt)
    : data.records.find(rec => rec.id === id);
  if (!r) return;
  if (!r.payType) r.payType = 'hourly';
  if (r.createdAt == null) r.createdAt = Date.now();
  if (r.hours != null && isNaN(parseFloat(r.hours))) r.hours = 0;
  if (r.rate != null && isNaN(parseFloat(r.rate))) r.rate = 0;
  if (r.tips != null && isNaN(parseFloat(r.tips))) r.tips = 0;
  saveData(data);
  const issues = detectDataIssues(data);
  if (issues.otherIssues.length > 0) {
    _renderCleanScreen2(issues, fixedDups);
  } else {
    _renderCleanDone(fixedDups, 0);
  }
}

function _cleanDeleteRecord(id, createdAt, fixedDups) {
  const data = loadData();
  const idx = createdAt
    ? data.records.findIndex(rec => rec.id === id && rec.createdAt === createdAt)
    : data.records.findIndex(rec => rec.id === id);
  if (idx === -1) return;
  data.records.splice(idx, 1);
  saveData(data);
  const issues = detectDataIssues(data);
  if (issues.otherIssues.length > 0) {
    _renderCleanScreen2(issues, fixedDups);
  } else {
    _renderCleanDone(fixedDups, 0);
  }
}

function _cleanFixAllOther(fixedDups) {
  const data = loadData();
  let fixed = 0;
  for (const r of data.records) {
    let changed = false;
    if (!r.payType) { r.payType = 'hourly'; changed = true; }
    if (r.createdAt == null) { r.createdAt = Date.now(); changed = true; }
    if (r.hours != null && isNaN(parseFloat(r.hours))) { r.hours = 0; changed = true; }
    if (r.rate != null && isNaN(parseFloat(r.rate))) { r.rate = 0; changed = true; }
    if (r.tips != null && isNaN(parseFloat(r.tips))) { r.tips = 0; changed = true; }
    if (changed) fixed++;
  }
  saveData(data);
  _renderCleanDone(fixedDups, fixed);
}

function _renderCleanDone(fixedDups, fixedOther) {
  const total = fixedDups + fixedOther;
  const details = [
    fixedDups > 0 ? `${fixedDups} duplicate ID${fixedDups !== 1 ? 's' : ''}` : '',
    fixedOther > 0 ? `${fixedOther} field issue${fixedOther !== 1 ? 's' : ''}` : ''
  ].filter(Boolean).join(', ');
  document.getElementById('cleanDataContent').innerHTML = `
    <div class="flex items-center justify-between">
      <div class="text-lg font-bold">Data Health</div>
      <button onclick="closeCleanDataMenu()" class="text-xs text-gray-400 py-1 px-2">Close</button>
    </div>
    <div class="flex flex-col items-center py-8 gap-4">
      <div class="w-16 h-16 rounded-full bg-emerald-600/20 border border-emerald-500/40 flex items-center justify-center">
        <svg class="w-8 h-8 text-emerald-400" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M20 6L9 17l-5-5"/></svg>
      </div>
      <div class="text-base font-bold text-emerald-300">${total > 0 ? 'Data Cleaned' : 'Data is Healthy'}</div>
      <div class="text-sm text-gray-400 text-center">
        ${total > 0 ? `Fixed ${total} issue${total !== 1 ? 's' : ''}: ${details}.` : 'No data integrity issues found.'}
      </div>
    </div>
    <button onclick="closeCleanDataMenu()" class="w-full bg-gray-800 hover:bg-gray-700 p-3 rounded-xl font-semibold">Done</button>
  `;
}

function closeCleanDataMenu() {
  const sheet = document.getElementById('cleanDataSheet');
  const overlay = document.getElementById('cleanDataOverlay');
  if (sheet) {
    sheet.classList.add('translate-y-full');
    setTimeout(() => {
      sheet.remove();
      if (overlay) overlay.remove();
    }, 300);
  } else if (overlay) {
    overlay.remove();
  }
}

/* ================================
   APP UPDATE / VERSION CHECKER
================================= */

let _swReg          = null;   // holds the SW registration once available
let _updateState    = 'idle'; // 'idle' | 'checking' | 'current' | 'available' | 'error'
let _latestVersion  = null;   // version string fetched from server

/**
 * Register the service worker and wire up update detection.
 * Called once on startup.
 */
async function initServiceWorker() {
  if (!('serviceWorker' in navigator)) return;
  try {
    _swReg = await navigator.serviceWorker.register('sw.js');

    // A new SW is already waiting (installed before this page load)
    if (_swReg.waiting) {
      _updateState = 'available';
      renderSettingsIfActive();
    }

    // A new SW starts installing while the page is open
    _swReg.addEventListener('updatefound', () => {
      const installing = _swReg.installing;
      installing.addEventListener('statechange', () => {
        if (installing.state === 'installed' && navigator.serviceWorker.controller) {
          _updateState = 'available';
          renderSettingsIfActive();
          showUpdateBanner();
        }
      });
    });

    // After skipWaiting the controller changes — reload to run new code
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      window.location.reload();
    });
  } catch (e) {
    console.warn('SW registration failed:', e);
  }
}

/** Re-renders settings only if the user is currently on that tab. */
function renderSettingsIfActive() {
  if (activeTab === 'settings') renderSettings();
}

/**
 * Fetch version.json from the server (bypassing all caches) and compare
 * with APP_VERSION.  Updates _updateState and _latestVersion.
 */
async function checkForAppUpdate() {
  if (!navigator.onLine) {
    showToast('No internet connection', 2500);
    return;
  }
  _updateState = 'checking';
  renderSettingsIfActive();

  try {
    // Trigger the SW's own update check in parallel
    if (_swReg) _swReg.update().catch(() => {});

    // Fetch the canary version file — sw.js never caches this
    const res = await fetch('version.json?t=' + Date.now(), { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const { version } = await res.json();
    _latestVersion = version;

    if (_swReg?.waiting || version !== APP_VERSION) {
      _updateState = 'available';
    } else {
      _updateState = 'current';
    }
  } catch (e) {
    _updateState = 'error';
  }
  renderSettingsIfActive();
}

/**
 * Tell the waiting SW to skip its waiting state, which will trigger
 * controllerchange → window.location.reload().
 * If there's no waiting SW but the server has a newer version, do a
 * hard reload so the (already-active) new SW serves fresh files.
 */
function applyAppUpdate() {
  if (_swReg?.waiting) {
    // Standard path: new SW is waiting → tell it to activate
    _swReg.waiting.postMessage({ type: 'SKIP_WAITING' });
    // controllerchange listener above will call reload()
  } else {
    // SW already activated (skipWaiting happened before this page loaded)
    // or no SW at all — just reload to get fresh files from the server/SW
    window.location.reload();
  }
}

/** Non-intrusive sticky banner shown when an update becomes available mid-session. */
function showUpdateBanner() {
  if (document.getElementById('updateBanner')) return;
  document.body.insertAdjacentHTML('beforeend', `
    <div id="updateBanner"
         class="fixed top-0 inset-x-0 z-[100] bg-indigo-600 text-white text-xs font-semibold
                flex items-center justify-between px-4 py-2 safe-top"
         style="padding-top: max(0.5rem, env(safe-area-inset-top))">
      <span>New version available</span>
      <div class="flex items-center gap-3">
        <button onclick="applyAppUpdate()" class="underline underline-offset-2">Reload now</button>
        <button onclick="document.getElementById('updateBanner').remove()" class="opacity-60">✕</button>
      </div>
    </div>
  `);
}

/* ================================
   START
================================= */
switchTab("dashboard");
initServiceWorker();
</script>
